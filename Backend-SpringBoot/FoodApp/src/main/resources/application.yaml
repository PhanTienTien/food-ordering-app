server:
  port: 8082

spring:
  application:
    name: FoodApp

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/food_ordering_app}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

file:
  upload-dir: ../../uploads
